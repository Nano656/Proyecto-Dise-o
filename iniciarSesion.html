<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="LogoFalsoMadrid.png" type="image/x-icon">
    <link rel="stylesheet" href="iniciarSesion.css">
    <title>Iniciar Sesion</title>
</head>
<body>
    <img src="LogoFalsoMadrid.png" alt="Logo Falso Madrid CF" class="logo">
    <h1>Iniciar Sesión</h1>
    <form method="post" class="formulario-container">
        <label for="email">E-Mail:</label>
        <input type="text" name="email" id="email" placeholder="ingresá tu E-Mail" required>

        <label for="contraseña">Contraseña:</label>
        <input type="password" name="contraseña" id="contraseña" placeholder="ingresá tu contraseña" required>

        <button onclick="window.location.href='/index.html'" class="button" type="submit">Iniciar Sesión</button>
    </form>
</body>
</html>
